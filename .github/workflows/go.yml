name: Go

on:
  push:
    branches:
      - "*"
    tags:
      - "*.*.*"
      - "*.*.*-*"
      - "test-release-*"
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check formatting
        run: make fmt-check

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test

      - name: Upload coverage
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  build:
    name: Build ${{ matrix.prefix }}/${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        prefix: [cola, cdt]
        os: [darwin, linux, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev"
          fi
          BUILD_NUM=$(date +%Y%m%d-%H%M%S)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "BUILD_NUM=${BUILD_NUM}" >> $GITHUB_OUTPUT

      - name: Build server
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXT=".exe"
          fi
          PREFIX="${{ matrix.prefix }}"
          LDFLAGS="-s -w -X 'main.version=${{ steps.version.outputs.VERSION }}' -X 'main.buildNum=${{ steps.version.outputs.BUILD_NUM }}' -X 'main.appName=${PREFIX}-registry' -X 'main.appLongName=Command Launcher Registry Server'"
          go build -ldflags="${LDFLAGS}" -o ${PREFIX}-registry${EXT} ./cmd/cola-registry

      - name: Build client
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXT=".exe"
          fi
          PREFIX="${{ matrix.prefix }}"
          LDFLAGS="-s -w -X 'main.version=${{ steps.version.outputs.VERSION }}' -X 'main.buildNum=${{ steps.version.outputs.BUILD_NUM }}' -X 'main.appName=${PREFIX}-regctl' -X 'main.appLongName=Command Launcher Registry CLI'"
          go build -ldflags="${LDFLAGS}" -o ${PREFIX}-regctl${EXT} ./cmd/cola-regctl

      - name: Upload artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.prefix }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ matrix.prefix }}-registry*
            ${{ matrix.prefix }}-regctl*

  package:
    name: Package Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Organize and rename binaries
        run: |
          mkdir -p release
          mkdir -p zip-content

          # Process each prefix/platform/arch combination
          for dir in artifacts/binaries-*; do
            if [ -d "$dir" ]; then
              # Extract prefix, os and arch from directory name (binaries-prefix-os-arch)
              dirname=$(basename "$dir")
              prefix=$(echo "$dirname" | cut -d'-' -f2)
              os=$(echo "$dirname" | cut -d'-' -f3)
              arch=$(echo "$dirname" | cut -d'-' -f4)

              # Create directory structure for zip
              mkdir -p "zip-content/${prefix}/${os}/${arch}"

              # Determine extension
              ext=""
              if [ "$os" = "windows" ]; then
                ext=".exe"
              fi

              # Copy and rename for individual release (with version suffix)
              if [ -f "$dir/${prefix}-registry${ext}" ]; then
                cp "$dir/${prefix}-registry${ext}" "release/${prefix}-registry_${os}_${arch}_${{ steps.version.outputs.VERSION }}${ext}"
                cp "$dir/${prefix}-registry${ext}" "zip-content/${prefix}/${os}/${arch}/${prefix}-registry${ext}"
              fi

              if [ -f "$dir/${prefix}-regctl${ext}" ]; then
                cp "$dir/${prefix}-regctl${ext}" "release/${prefix}-regctl_${os}_${arch}_${{ steps.version.outputs.VERSION }}${ext}"
                cp "$dir/${prefix}-regctl${ext}" "zip-content/${prefix}/${os}/${arch}/${prefix}-regctl${ext}"
              fi
            fi
          done

          # Create consolidated zip per prefix
          cd zip-content
          for prefix in */; do
            prefix_name="${prefix%/}"
            zip -r "../release/${prefix_name}-registry_${{ steps.version.outputs.VERSION }}.zip" "${prefix_name}/"
          done
          cd ..

          # List release contents
          echo "Release contents:"
          ls -la release/

      - name: Upload release artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release

      # TODO: When open sourcing, consider using softprops/action-gh-release@v2 instead
      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"

          # Determine if pre-release
          PRERELEASE_FLAG=""
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]] || [[ "$VERSION" =~ ^test-release- ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Try to create release, if exists - upload assets
          if gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            $PRERELEASE_FLAG \
            release/* 2>/dev/null; then
            echo "Release $VERSION created successfully"
          else
            echo "Release $VERSION exists, uploading assets..."
            gh release upload "$VERSION" release/*
          fi
